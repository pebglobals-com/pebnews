name = "pebnews-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "pebnews-db"
database_id = "5d813133-4141-4259-9efa-bb89d39d2957"

# R2 Bucket (uncomment after enabling R2 in Cloudflare Dashboard)
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "pebnews-images"

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "420417d4798c444c9c88a475f889a78e"

# Cron Trigger for RSS ingestion
[triggers]
crons = ["*/15 * * * *"]

# Environment variables
[vars]
RSS_FETCH_INTERVAL_CRON = "*/15 * * * *"
